<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Progress Tracker - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #7c3aed;
            --accent-color: #06b6d4;
            --dark-bg: #0f172a;
            --light-bg: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }

        .login-image {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            padding: 60px 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-image h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .login-image p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .login-form {
            padding: 60px 40px;
        }

        .login-form h3 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .login-form .subtitle {
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .form-floating > .form-control {
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            padding: 1rem 1rem;
        }

        .form-floating > .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-btn:hover {
            border-color: var(--primary-color);
        }

        .role-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .role-btn i {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .alert {
            border-radius: 10px;
            border: none;
        }

        @media (max-width: 768px) {
            .login-image {
                display: none;
            }
            .login-form {
                padding: 40px 20px;
            }
        }

        .dark-mode {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }

        .dark-mode .login-card {
            background: #1e293b;
        }

        .dark-mode .login-form h3 {
            color: white;
        }

        .dark-mode .form-floating > .form-control {
            background: #334155;
            border-color: #475569;
            color: white;
        }

        .dark-mode .role-btn {
            background: #334155;
            border-color: #475569;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="row g-0">
                <div class="col-lg-6">
                    <div class="login-image">
                        <h2>Campus Progress Tracker</h2>
                        <p>Empowering education through data-driven insights. Track syllabus progress, monitor student confidence, and enhance learning outcomes.</p>
                        <div class="mt-4">
                            <i class="bi bi-graph-up-arrow" style="font-size: 3rem;"></i>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="login-form">
                        <h3>Welcome Back</h3>
                        <p class="subtitle">Sign in to your account</p>
                        
                        <div id="alert-container"></div>
                        
                        <form id="loginForm">
                            <div class="role-selector">
                                <button type="button" class="role-btn active" data-role="Admin">
                                    <i class="bi bi-person-gear"></i>
                                    <small>Admin</small>
                                </button>
                                <button type="button" class="role-btn" data-role="Faculty">
                                    <i class="bi bi-person-workspace"></i>
                                    <small>Faculty</small>
                                </button>
                                <button type="button" class="role-btn" data-role="Student">
                                    <i class="bi bi-person-graduation"></i>
                                    <small>Student</small>
                                </button>
                                <button type="button" class="role-btn" data-role="Parent">
                                    <i class="bi bi-people"></i>
                                    <small>Parent</small>
                                </button>
                            </div>
                            
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="email" placeholder="Email" required>
                                <label for="email">Email Address</label>
                            </div>
                            
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="password" placeholder="Password" required>
                                <label for="password">Password</label>
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="remember">
                                    <label class="form-check-label" for="remember">Remember me</label>
                                </div>
                                <a href="#" class="text-decoration-none">Forgot password?</a>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">
                                <span id="loginText">Sign In</span>
                                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                            </button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="text-muted">Don't have an account? <a href="#" class="text-decoration-none fw-bold">Contact Administrator</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedRole = 'Admin';

        // Role selector
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedRole = this.dataset.role;
            });
        });

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            const alertContainer = document.getElementById('alert-container');
            
            // Show loading state
            loginText.textContent = 'Signing in...';
            loginSpinner.classList.remove('d-none');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store token and user info
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Redirect based on role
                    const dashboardMap = {
                        'Admin': '/admin-dashboard.html',
                        'Faculty': '/faculty-dashboard.html',
                        'Student': '/student-dashboard.html',
                        'Parent': '/parent-dashboard.html'
                    };
                    
                    window.location.href = dashboardMap[data.user.role] || '/admin-dashboard.html';
                } else {
                    showAlert('error', data.error || 'Login failed');
                }
            } catch (error) {
                showAlert('error', 'Network error. Please try again.');
            } finally {
                loginText.textContent = 'Sign In';
                loginSpinner.classList.add('d-none');
            }
        });

        function showAlert(type, message) {
            const alertContainer = document.getElementById('alert-container');
            const alertClass = type === 'error' ? 'alert-danger' : 'alert-success';
            alertContainer.innerHTML = `
                <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        // Dark mode toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
    </script>
</body>
</html>
